<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detector de Mecánica YOLO26s</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0a0a0a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        #status {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 12px 20px;
            font-size: 14px;
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #333;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #00ff88;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-wrap: break-word;
        }
        
        #status.error {
            color: #ff4444;
        }
        
        #status.loading {
            color: #ffaa00;
        }
        
        #container {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 1/1;
            background-color: #000;
            margin-top: 50px;
        }
        
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        canvas {
            z-index: 10;
            pointer-events: none;
        }
        
        #info-overlay {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #aaa;
            z-index: 100;
            text-align: center;
            border: 1px solid #333;
        }
        
        @media (max-width: 640px) {
            #status {
                font-size: 12px;
                padding: 10px 15px;
                min-height: 44px;
            }
            
            #container {
                margin-top: 44px;
            }
        }
    </style>
</head>
<body>

    <div id="status" class="loading">⏳ Inicializando sistema...</div>
    
    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>
    
    <div id="info-overlay">🔍 Apunta a componentes del motor</div>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        
        const LABELS = [
            "ABS Unit", "Air Filter", "Air Filter Cover", "Alternator", "ATF Oil Reservoir",
            "Battery", "Brake Fluid", "Cabin Air Filter Housing", "Clutch Fluid Reservoir", 
            "Cold Air Intake", "Electric Motor", "Engine Coolant Reservoir", "Engine Cover", 
            "Engine Oil Dip Stick", "Engine Oil Fill Cap", "Fuse Box", 
            "Intercooler Coolant Reservoir", "Inverter Coolant Reservoir", "Oil Filter", 
            "Oil Filter Housing", "Power Steering Reservoir", "Radiator", "Radiator Cap", 
            "Secondary Coolant Reservoir", "Transmission Oil Dip Stick", "Windshield Wiper Fluid"
        ];
        
        const MODEL_PATH = "https://raw.githubusercontent.com/AlejandroP27/prueba/refs/heads/main/best.onnx";
        const CONFIDENCE_THRESHOLD = 0.45;
        const INPUT_SIZE = 640;
        
        // ============================================
        // ELEMENTOS DOM
        // ============================================
        
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        
        let session = null;
        let isDetecting = false;
        let frameCount = 0;
        const FRAME_SKIP = 2;
        let inputName = null;
        let outputName = null;
        
        function updateStatus(message, type = 'loading') {
            statusDiv.textContent = message;
            statusDiv.className = type;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        // ============================================
        // CÁMARA
        // ============================================
        
        async function setupCamera() {
            updateStatus('📸 Solicitando acceso a la cámara...', 'loading');
            
            try {
                let stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment",
                        width: { ideal: 640 },
                        height: { ideal: 640 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 640;
                        updateStatus('📷 Cámara lista', 'loading');
                        resolve();
                    };
                    
                    setTimeout(() => {
                        if (video.videoWidth > 0) {
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            resolve();
                        }
                    }, 3000);
                });
            } catch (error) {
                updateStatus('❌ Error cámara: ' + error.message, 'error');
                throw error;
            }
        }
        
        // ============================================
        // CARGA DEL MODELO - VERSIÓN CORREGIDA
        // ============================================
        
        async function loadModel() {
            updateStatus('🧠 Descargando modelo YOLO26s (36MB)...', 'loading');
            
            try {
                if (typeof ort === 'undefined') {
                    throw new Error('ONNX Runtime no está disponible');
                }
                
                ort.env.wasm.numThreads = 1;
                ort.env.wasm.simd = true;
                ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/';
                
                const options = {
                    executionProviders: ['wasm', 'webgl'],
                    graphOptimizationLevel: 'all',
                    enableCpuMemArena: true,
                    enableMemPattern: true
                };
                
                // ✅ Cargar modelo
                session = await ort.InferenceSession.create(MODEL_PATH, options);
                
                // ✅ OBTENER NOMBRES DE INPUT Y OUTPUT AUTOMÁTICAMENTE
                inputName = session.inputNames[0];
                outputName = session.outputNames[0];
                
                console.log('🔍 Nombres del modelo:');
                console.log('  Inputs:', session.inputNames);
                console.log('  Outputs:', session.outputNames);
                console.log('  Input name:', inputName);
                console.log('  Output name:', outputName);
                
                // ✅ Verificar metadatos
                if (session.inputMetadata && session.inputMetadata[inputName]) {
                    const meta = session.inputMetadata[inputName];
                    console.log(`  Input dims: [${meta.dims.join(', ')}]`);
                }
                
                if (session.outputMetadata && session.outputMetadata[outputName]) {
                    const meta = session.outputMetadata[outputName];
                    console.log(`  Output dims: [${meta.dims.join(', ')}]`);
                }
                
                updateStatus(`✅ Modelo cargado (${outputName})`, 'loading');
                isDetecting = true;
                startDetection();
                
            } catch (error) {
                updateStatus('❌ Error al cargar modelo: ' + error.message, 'error');
                console.error('Error detallado:', error);
                throw error;
            }
        }
        
        // ============================================
        // DETECCIÓN
        // ============================================
        
        function startDetection() {
            if (!isDetecting) return;
            
            async function detectLoop() {
                if (!isDetecting) return;
                
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    frameCount++;
                    if (frameCount % FRAME_SKIP === 0) {
                        try {
                            await processFrame();
                        } catch (e) {
                            // Silenciar errores de frames
                        }
                    }
                }
                
                requestAnimationFrame(detectLoop);
            }
            
            detectLoop();
        }
        
        async function processFrame() {
            // ✅ Verificar que la sesión y los nombres existan
            if (!session) {
                console.warn('Session no disponible');
                return;
            }
            
            if (!inputName || !outputName) {
                console.warn('Nombres de input/output no definidos');
                return;
            }
            
            try {
                // Crear canvas temporal
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = INPUT_SIZE;
                tempCanvas.height = INPUT_SIZE;
                const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
                
                // Dibujar y escalar
                tempCtx.drawImage(video, 0, 0, INPUT_SIZE, INPUT_SIZE);
                const imageData = tempCtx.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
                const { data } = imageData;
                
                // Convertir a float32 CHW
                const float32Array = new Float32Array(1 * 3 * INPUT_SIZE * INPUT_SIZE);
                const size = INPUT_SIZE * INPUT_SIZE;
                
                let rIdx = 0;
                let gIdx = size;
                let bIdx = 2 * size;
                
                for (let i = 0; i < data.length; i += 4) {
                    float32Array[rIdx++] = data[i] / 255.0;
                    float32Array[gIdx++] = data[i + 1] / 255.0;
                    float32Array[bIdx++] = data[i + 2] / 255.0;
                }
                
                // Crear tensor
                const inputTensor = new ort.Tensor('float32', float32Array, [1, 3, INPUT_SIZE, INPUT_SIZE]);
                
                // ✅ Usar el nombre de input correcto
                const feeds = {};
                feeds[inputName] = inputTensor;
                
                // Ejecutar inferencia
                const results = await session.run(feeds);
                
                // ✅ Usar el nombre de output correcto
                const output = results[outputName];
                
                if (!output) {
                    console.warn('No se encontró el output:', outputName);
                    console.log('Outputs disponibles:', Object.keys(results));
                    return;
                }
                
                // ✅ Procesar la salida
                drawPredictions(output.data, output.dims);
                
            } catch (error) {
                console.warn('Error en procesamiento:', error.message);
                console.error(error);
            }
        }
        
        // ============================================
        // DIBUJADO - VERSIÓN CORREGIDA
        // ============================================
        
        function drawPredictions(data, dims) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!data || !dims || dims.length < 3) {
                return;
            }
            
            // ✅ Formato: [1, 300, 6]
            const numPredictions = dims[1] || 0;
            const predLength = dims[2] || 0;
            
            if (numPredictions === 0 || predLength === 0) {
                return;
            }
            
            const scaleX = canvas.width / INPUT_SIZE;
            const scaleY = canvas.height / INPUT_SIZE;
            
            let detections = [];
            
            for (let i = 0; i < numPredictions; i++) {
                const offset = i * predLength;
                
                // ✅ Formato: [x1, y1, x2, y2, confidence, class_id]
                const x1 = data[offset + 0] || 0;
                const y1 = data[offset + 1] || 0;
                const x2 = data[offset + 2] || 0;
                const y2 = data[offset + 3] || 0;
                const confidence = data[offset + 4] || 0;
                const classId = Math.round(data[offset + 5] || 0);
                
                // Validar coordenadas
                if (x1 < 0 || x1 > INPUT_SIZE || x2 < 0 || x2 > INPUT_SIZE ||
                    y1 < 0 || y1 > INPUT_SIZE || y2 < 0 || y2 > INPUT_SIZE) {
                    continue;
                }
                
                if (x2 <= x1 || y2 <= y1) {
                    continue;
                }
                
                if (confidence < CONFIDENCE_THRESHOLD) {
                    continue;
                }
                
                if (classId < 0 || classId >= LABELS.length) {
                    continue;
                }
                
                const x = x1 * scaleX;
                const y = y1 * scaleY;
                const width = (x2 - x1) * scaleX;
                const height = (y2 - y1) * scaleY;
                
                detections.push({
                    x, y, width, height,
                    label: LABELS[classId],
                    confidence: confidence,
                    classId: classId
                });
            }
            
            // Ordenar y limitar
            detections.sort((a, b) => b.confidence - a.confidence);
            
            if (detections.length > 10) {
                detections = detections.slice(0, 10);
            }
            
            // Dibujar
            for (const det of detections) {
                const { x, y, width, height, label, confidence } = det;
                const hue = (det.classId * 360 / LABELS.length) % 360;
                
                // Rectángulo
                ctx.strokeStyle = `hsl(${hue}, 80%, 60%)`;
                ctx.lineWidth = 3;
                ctx.shadowColor = `hsla(${hue}, 80%, 60%, 0.3)`;
                ctx.shadowBlur = 10;
                ctx.strokeRect(x, y, width, height);
                ctx.shadowBlur = 0;
                
                // Texto
                const text = `${label} (${Math.round(confidence * 100)}%)`;
                ctx.font = "bold 14px 'Segoe UI', Arial, sans-serif";
                const metrics = ctx.measureText(text);
                const textWidth = metrics.width;
                const padding = 6;
                const rectHeight = 26;
                
                ctx.fillStyle = `hsla(${hue}, 80%, 50%, 0.9)`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.fillRect(x - 2, y - rectHeight - 2, textWidth + padding * 2 + 4, rectHeight + 4);
                ctx.shadowBlur = 0;
                
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 4;
                ctx.fillText(text, x + padding, y - 8);
                ctx.shadowBlur = 0;
            }
            
            // Contador
            if (detections.length > 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(10, 10, 160, 28);
                ctx.fillStyle = '#00ff88';
                ctx.font = "12px Arial";
                ctx.fillText(`🔍 ${detections.length} detecciones`, 20, 30);
            }
        }
        
        // ============================================
        // INICIALIZACIÓN
        // ============================================
        
        window.addEventListener('load', async () => {
            try {
                if (typeof ort === 'undefined') {
                    throw new Error('ONNX Runtime no se cargó correctamente.');
                }
                
                console.log('🚗 Detector de Mecánica YOLO26s');
                console.log(`📊 Clases: ${LABELS.length}`);
                console.log(`📁 Modelo: ${MODEL_PATH}`);
                console.log(`🔧 ONNX Runtime:`, ort.version || 'desconocida');
                
                await setupCamera();
                await loadModel();
                
            } catch (error) {
                console.error('❌ Error fatal:', error);
                updateStatus(`❌ Error: ${error.message}`, 'error');
            }
        });
        
        window.addEventListener('beforeunload', () => {
            isDetecting = false;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
