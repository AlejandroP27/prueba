<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Mecánica YOLO26s</title>
    <!-- Cargamos ONNX Runtime Web desde CDN -->
    <!-- <script src="https://jsdelivr.net"></script> -->
    <script src="https://cloudflare.com"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 1/1; /* YOLO26 trabaja mejor en formato cuadrado 640x640 */
            background-color: #000;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        canvas {
            z-index: 10;
        }
        #status {
            padding: 10px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="status">Cargando modelo YOLO26s... por favor espera.</div>
    
    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        // --- CONFIGURACIÓN DE TU DATASET ---
        // REEMPLAZA ESTO CON TUS 26 CLASES EN EL ORDEN EXACTO DE TU DATA.YAML
        const LABELS = [
            "ABS Unit", "Air Filter", "Air Filter Cover", "Alternator", "ATF Oil Reservoir", 
            "Battery", "Brake Fluid", "Cabin Air Filter Housing", "Clutch Fluid Reservoir", "Cold Air Intake",
            "Electric Motor", "Engine Coolant Reservoir", "Engine Cover", "Engine Oil Dip Stick", "Engine Oil Fill Cap",
            "Fuse Box", "Intercooler Coolant Reservoir", "Inverter Coolant Reservoir", "Oil Filter", "Oil Filter Housing",
            "Power Steering Reservoir", "Radiator", "Radiator Cap", "Secondary Coolant Reservoir", "Transmission Oil Dip Stick", "Windshield Wiper Fluid"
        ];
        
        const MODEL_PATH = "./best.onnx"; 
        const CONFIDENCE_THRESHOLD = 0.40; // Muestra objetos con más de 40% de certeza

        let session;
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');

        // 1. Iniciar la cámara trasera del celular
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment", // Fuerza la cámara trasera del móvil
                        width: { ideal: 640 },
                        height: { ideal: 640 }
                    },
                    audio: false
                });
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        // Ajustamos el tamaño interno del lienzo gráfico al del video
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        resolve();
                    };
                });
            } catch (error) {
                statusDiv.innerText = "Error al acceder a la cámara trasera: " + error.message;
            }
        }

        // 2. Cargar el modelo ONNX usando WebGL (Aceleración por Tarjeta Gráfica)
        async function loadModel() {
            try {
                // Configuramos ONNX para usar la GPU del celular (webgl)
                session = await ort.InferenceSession.create(MODEL_PATH, { executionProviders: ['webgl'] });
                statusDiv.innerText = "¡YOLO26s cargado con éxito! Apunta al motor.";
                startDetection();
            } catch (error) {
                statusDiv.innerText = "Error al cargar el modelo: " + error.message;
                console.error(error);
            }
        }

        // 3. Bucle continuo de detección
        function startDetection() {
            async function renderFrame() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    await processVideoFrame();
                }
                requestAnimationFrame(renderFrame); // Ejecuta el siguiente frame inmediatamente
            }
            requestAnimationFrame(renderFrame);
        }

        // 4. Preprocesar la imagen y correr la Inteligencia Artificial
        async function processVideoFrame() {
            // Creamos un lienzo temporal de 640x640 para procesar la matriz de la imagen
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 640;
            tempCanvas.height = 640;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, 0, 0, 640, 640);
            
            const imageData = tempCtx.getImageData(0, 0, 640, 640);
            const { data } = imageData;

            // YOLO requiere que los píxeles estén normalizados entre 0 y 1, separados por canales (R, G, B)
            const float32Array = new Float32Array(1 * 3 * 640 * 640);
            let rIndex = 0;
            let gIndex = 640 * 640;
            let bIndex = 2 * 640 * 640;

            for (let i = 0; i < data.length; i += 4) {
                float32Array[rIndex++] = data[i] / 255.0;     // Rojo
                float32Array[gIndex++] = data[i + 1] / 255.0; // Verde
                float32Array[bIndex++] = data[i + 2] / 255.0; // Azul
            }

            // Crear el Tensor de entrada compatible con ONNX Runtime
            const inputTensor = new ort.Tensor('float32', float32Array, [1, 3, 640, 640]);

            try {
                // Ejecutar la inferencia (predicción) en la GPU
                const feeds = {};
                feeds[session.inputNames[0]] = inputTensor;
                const outputMap = await session.run(feeds);
                
                // YOLO26 devuelve los resultados en la primera propiedad de salida
                const outputTensor = outputMap[session.outputNames[0]];
                
                // Dibujar los cuadros de detección en la pantalla del celular
                drawBoundingBoxes(outputTensor.data, outputTensor.dims);
            } catch (err) {
                console.error("Fallo en la predicción:", err);
            }
        }

        // 5. Dibujar los rectángulos y las etiquetas de texto
        function drawBoundingBoxes(data, dims) {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Limpiar el frame anterior

            // La salida típica de YOLO26 suele venir estructurada en filas de predicciones
            const numPredictions = dims[1]; 
            const elementsPerPrediction = dims[2]; 

            // Escala para ajustar las coordenadas 640x640 al tamaño real de tu pantalla
            const scaleX = canvas.width / 640;
            const scaleY = canvas.height / 640;

            // YOLO26 nativo entrega los recuadros limpios directo en una sola matriz
            for (let i = 0; i < numPredictions; i++) {
                const offset = i * elementsPerPrediction;
                
                // Estructura de salida estándar de YOLO (x_center, y_center, width, height, clases...)
                const cx = data[offset + 0];
                const cy = data[offset + 1];
                const w = data[offset + 2];
                const h = data[offset + 3];
                
                // Buscamos cuál de las 26 clases tiene la mayor puntuación de certeza
                let maxConfidence = 0;
                let classId = -1;
                for (let c = 4; c < elementsPerPrediction; c++) {
                    if (data[offset + c] > maxConfidence) {
                        maxConfidence = data[offset + c];
                        classId = c - 4;
                    }
                }

                // Si supera nuestro umbral de confianza, lo dibujamos en pantalla
                if (maxConfidence > CONFIDENCE_THRESHOLD && classId >= 0 && classId < LABELS.length) {
                    const x = (cx - w / 2) * scaleX;
                    const y = (cy - h / 2) * scaleY;
                    const width = w * scaleX;
                    const height = h * scaleY;

                    // Dibujar el cuadro con un borde verde brillante
                    ctx.strokeStyle = "#00FF00";
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, y, width, height);

                    // Dibujar fondo del texto de la etiqueta
                    ctx.fillStyle = "#00FF00";
                    const text = `${LABELS[classId]} (${Math.round(maxConfidence * 100)}%)`;
                    ctx.font = "bold 16px Arial";
                    const textWidth = ctx.measureText(text).width;
                    ctx.fillRect(x, y - 25, textWidth + 10, 25);

                    // Escribir el nombre de la pieza mecánica en negro
                    ctx.fillStyle = "#000000";
                    ctx.fillText(text, x + 5, y - 7);
                }
            }
        }

        // Iniciar la aplicación al cargar la página
        async function main() {
            await setupCamera();
            await loadModel();
        }
        
        //window.onload = main;
        // Esperamos a que la página y todas las librerías externas estén 100% cargadas
window.addEventListener('load', () => {
    // Le damos un margen de 500ms al celular para registrar la librería 'ort'
    setTimeout(() => {
        if (typeof ort !== 'undefined') {
            main();
        } else {
            document.getElementById('status').innerText = "Error: La librería ONNX no se cargó correctamente. Intenta refrescar la página.";
        }
    }, 500);
});

    </script>
</body>
</html>
